# =============================================================================
# Alpha Search - CI/CD Pipeline
# Builds and deploys Docker images on push to main and releases
# =============================================================================

name: Build & Deploy

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Deployment target'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  API_IMAGE_NAME: ${{ github.repository }}/alpha-search-api
  UI_IMAGE_NAME: ${{ github.repository }}/alpha-search-ui
  PYTHON_VERSION: '3.11'

jobs:
  # =========================================================================
  # Job 1: Lint & Test
  # =========================================================================
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest pytest-cov
          pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          ruff check alpha_search/
          ruff format --check alpha_search/

      - name: Type check with mypy
        run: mypy alpha_search/ --ignore-missing-imports

      - name: Run tests with coverage
        run: pytest --cov=alpha_search --cov-report=xml --cov-report=term

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # =========================================================================
  # Job 2: Build & Push Docker Images
  # =========================================================================
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    strategy:
      matrix:
        include:
          - dockerfile: ./Dockerfile
            image: alpha-search-api
            target: production
          - dockerfile: ./Dockerfile.ui
            image: alpha-search-ui
            target: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_VERSION=${{ github.ref_name }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VCS_REF=${{ github.sha }}
          platforms: linux/amd64,linux/arm64

      - name: Generate artifact attestation
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ matrix.image }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  # =========================================================================
  # Job 3: Deploy to VPS (optional - triggered manually or on release)
  # =========================================================================
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    environment:
      name: ${{ startsWith(github.ref, 'refs/tags/v') && 'production' || 'staging' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
        if: env.VPS_HOST != '' && env.SSH_KEY != ''
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || '22' }}
          script_stop: true
          script: |
            set -euo pipefail
            echo "=== Alpha Search Deployment ==="
            echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "Deploying: ${{ github.sha }}"
            echo ""

            # Navigate to project
            cd ~/alpha-search || exit 1

            # Pull latest compose and scripts
            git fetch origin
            git reset --hard origin/main

            # Write environment file
            cat > .env <<ENVEOF
            GITHUB_REPOSITORY=${{ github.repository }}
            API_WORKERS=2
            RATE_LIMIT=60
            DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL || '' }}
            ENVEOF
            chmod 600 .env

            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest images
            echo "Pulling latest images..."
            docker compose pull

            # Run database migrations if any
            echo "Running migrations..."
            # docker compose run --rm alpha-search-api alembic upgrade head

            # Deploy with zero-downtime
            echo "Deploying services..."
            docker compose up -d --remove-orphans

            # Wait for health checks
            echo "Waiting for health checks..."
            sleep 10
            
            # Verify deployment
            MAX_RETRIES=12
            RETRY_INTERVAL=10
            for service in alpha-search-api alpha-search-ui nginx; do
              echo "Checking $service..."
              for i in $(seq 1 $MAX_RETRIES); do
                if docker compose ps $service | grep -q "healthy"; then
                  echo "$service is healthy"
                  break
                fi
                if [ "$i" -eq "$MAX_RETRIES" ]; then
                  echo "ERROR: $service failed health check"
                  echo "Rolling back..."
                  docker compose down
                  docker compose up -d --remove-orphans
                  exit 1
                fi
                echo "  Attempt $i/$MAX_RETRIES - waiting..."
                sleep $RETRY_INTERVAL
              done
            done

            # Cleanup
            echo "Cleaning up old images..."
            docker image prune -af --filter "until=72h"
            docker system prune -f

            echo ""
            echo "=== Deployment Complete ==="
            echo "API: https://${{ secrets.VPS_HOST }}/api"
            echo "UI:  https://${{ secrets.VPS_HOST }}"

      - name: Notify Discord (success)
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        if: success() && env.DISCORD_WEBHOOK_URL != ''
        uses: Ilshidur/action-discord@master
        with:
          args: |
            Alpha Search deployed successfully!
            Environment: ${{ startsWith(github.ref, 'refs/tags/v') && 'production' || 'staging' }}
            Commit: ${{ github.sha }}
            URL: https://${{ env.VPS_HOST }}

      - name: Notify Discord (failure)
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        if: failure() && env.DISCORD_WEBHOOK_URL != ''
        uses: Ilshidur/action-discord@master
        with:
          args: |
            Alpha Search deployment FAILED!
            Environment: ${{ startsWith(github.ref, 'refs/tags/v') && 'production' || 'staging' }}
            Commit: ${{ github.sha }}
            Check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}