# Alpha Search GitHub Labels
# Apply with: gh label create -R alpha-search/alpha-search -f "$name" -c "$color" -d "$description"
# Or use: gh label clone --from-repo alpha-search/alpha-search --to-repo alpha-search/alpha-search

# ============================================================================
# TYPE — What kind of issue/PR is this?
# ============================================================================

- name: bug
  color: "d73a4a"
  description: Something isn't working

- name: enhancement
  color: "a2eeef"
  description: New feature or request

- name: documentation
  color: "0075ca"
  description: Improvements or additions to documentation

- name: refactor
  color: "c2e0c6"
  description: Code change that neither fixes a bug nor adds a feature

- name: test
  color: "bfe5bf"
  description: Adding or correcting tests

- name: chore
  color: "fef2c0"
  description: Maintenance tasks, dependencies, build process

- name: performance
  color: "ffb3b3"
  description: Performance improvements or regressions

- name: security
  color: "ff0000"
  description: Security-related issues or patches

# ============================================================================
# PRIORITY — How urgent is this?
# ============================================================================

- name: priority-critical
  color: "b60205"
  description: Blocks release or core functionality

- name: priority-high
  color: "d93f0b"
  description: Major impact, should be addressed soon

- name: priority-medium
  color: "fbca04"
  description: Normal priority

- name: priority-low
  color: "0e8a16"
  description: Minor impact or nice-to-have

# ============================================================================
# STATUS — Where is this in the workflow?
# ============================================================================

- name: triage
  color: "d876e3"
  description: Needs initial assessment and labeling

- name: needs-info
  color: "ff7619"
  description: Waiting for reporter to provide more information

- name: in-progress
  color: "0052cc"
  description: Actively being worked on

- name: needs-review
  color: "5319e7"
  description: Awaiting code review

- name: blocked
  color: "e11d21"
  description: Blocked by another issue or dependency

- name: duplicate
  color: "cfd3d7"
  description: This issue or pull request already exists

- name: wontfix
  color: "ffffff"
  description: This won't be worked on

- name: good first issue
  color: "7057ff"
  description: Good for newcomers to the project

- name: help wanted
  color: "008672"
  description: Looking for community contributors

- name: question
  color: "d876e3"
  description: Further information is requested

