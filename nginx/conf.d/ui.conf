# =============================================================================
# Quant.OS UI Virtual Host
# Proxies requests to the Streamlit frontend container
# =============================================================================

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name alpha-search.dev www.alpha-search.dev;
    return 301 https://$server_name$request_uri;
}

# Main UI Server
server {
    listen 443 ssl http2;
    server_name alpha-search.dev www.alpha-search.dev;

    # SSL certificates (Cloudflare Origin CA)
    ssl_certificate /etc/nginx/ssl/cloudflare-origin.pem;
    ssl_certificate_key /etc/nginx/ssl/cloudflare-origin.key;

    # Access log
    access_log /var/log/nginx/ui-access.log main;
    error_log /var/log/nginx/ui-error.log warn;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Static Assets (cache aggressively) ─────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://alpha-search-ui:8501;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache static assets
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Streamlit Health Check ─────────────────────────────────────────
    location /healthz {
        proxy_pass http://alpha-search-ui:8501/healthz;
        access_log off;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ── Streamlit WebSocket (for live updates) ─────────────────────────
    location ~* ^/_stcore/(.*) {
        proxy_pass http://alpha-search-ui:8501/_stcore/$1;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # ── Main Application ───────────────────────────────────────────────
    location / {
        limit_req zone=api burst=30 nodelay;

        proxy_pass http://alpha-search-ui:8501;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        proxy_connect_timeout 10s;
        proxy_send_timeout 10s;
        proxy_read_timeout 60s;

        # Streamlit requires these for WebSocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Error Pages ────────────────────────────────────────────────────
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}