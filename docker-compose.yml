# =============================================================================
# Alpha Search - Production Docker Compose
# Phase 1: Single-node deployment on Hostinger VPS / Oracle Cloud Free Tier
# =============================================================================
# Usage:
#   docker compose up -d          # Start all services
#   docker compose logs -f        # Tail logs
#   docker compose pull           # Update images
#   docker compose down           # Stop all services
# =============================================================================

name: alpha-search

services:
  # ===========================================================================
  # API Service - FastAPI backend
  # ===========================================================================
  alpha-search-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: ghcr.io/${GITHUB_REPOSITORY:-alpha-search/alpha-search}/alpha-search-api:latest
    container_name: alpha-search-api
    ports:
      - "127.0.0.1:8000:8000"  # Bind to localhost only; Nginx reverse proxies
    environment:
      - APP_ENV=production
      - CACHE_DIR=/app/cache
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
      - REDIS_URL=redis://redis:6379/0
      - DUCKDB_PATH=/data/alpha-search.duckdb
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - WORKERS=${API_WORKERS:-2}
      - MAX_REQUESTS_PER_MINUTE=${RATE_LIMIT:-60}
    volumes:
      - alpha-search-cache:/app/cache
      - duckdb-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    networks:
      - alpha-search-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=50m

  # ===========================================================================
  # UI Service - Streamlit frontend
  # ===========================================================================
  alpha-search-ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
      target: production
    image: ghcr.io/${GITHUB_REPOSITORY:-alpha-search/alpha-search}/alpha-search-ui:latest
    container_name: alpha-search-ui
    ports:
      - "127.0.0.1:8501:8501"  # Bind to localhost only; Nginx reverse proxies
    depends_on:
      alpha-search-api:
        condition: service_healthy
    environment:
      - API_URL=http://alpha-search-api:8000
      - LOG_LEVEL=INFO
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
      - STREAMLIT_THEME_BASE=dark
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8501/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    networks:
      - alpha-search-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=50m

  # ===========================================================================
  # Redis - Session cache & rate limiting
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: alpha-search-redis
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --save "900 1 300 10 60 10000"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    networks:
      - alpha-search-net
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    read_only: true

  # ===========================================================================
  # Nginx - Reverse proxy & SSL termination
  # Cloudflare connects here; Nginx proxies to internal services
  # ===========================================================================
  nginx:
    image: nginx:alpine
    container_name: alpha-search-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      alpha-search-api:
        condition: service_healthy
      alpha-search-ui:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M
    networks:
      - alpha-search-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true
    read_only: true

  # ===========================================================================
  # Watchtower - Automatic container updates
  # Checks GHCR every 6 hours for new images and auto-updates
  # ===========================================================================
  watchtower:
    image: containrrr/watchtower:latest
    container_name: alpha-search-watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - WATCHTOWER_POLL_INTERVAL=21600   # 6 hours
      - WATCHTOWER_CLEANUP=true           # Remove old images
      - WATCHTOWER_INCLUDE_STOPPED=true
      - WATCHTOWER_REVIVE_STOPPED=true
      - WATCHTOWER_ROLLING_RESTART=true
      - WATCHTOWER_LABEL_ENABLE=true      # Only update containers with label
      - WATCHTOWER_NOTIFICATIONS=shoutrrr
      - WATCHTOWER_NOTIFICATION_URL=${DISCORD_WEBHOOK_URL:-}
      - WATCHTOWER_NOTIFICATION_TITLE="Alpha Search Deployment"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 32M
    networks:
      - alpha-search-net
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

# =============================================================================
# Persistent Volumes
# =============================================================================
volumes:
  alpha-search-cache:
    driver: local
  redis-data:
    driver: local
  duckdb-data:
    driver: local
  nginx-logs:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  alpha-search-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16